<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zero Lich | Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

    <style>
        :root {
            --bg: #020202;
            --sidebar: #060606;
            --panel: #0a0a0a;
            --border: #1f0a0a;
            --primary: #e60000;
            --primary-glow: #ff1a1a;
            --secondary: #cc0000;
            --text: #e8e8e8;
            --muted: #7a7a7a;
            --success: #00e676;
            --terminal-bg: #000000;
            --terminal-text: #00ff88;
            --prompt: #ff4d4d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Orbitron', sans-serif;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Global scanlines */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.08) 2px,
                    rgba(0, 0, 0, 0.08) 4px);
            opacity: 0.45;
        }

        /* CRT flicker */
        .crt-flicker {
            position: fixed;
            inset: 0;
            z-index: 99;
            pointer-events: none;
            background: rgba(255, 0, 0, 0.02);
            animation: flicker 0.15s infinite alternate;
            opacity: 0;
        }
        @keyframes flicker {
            0% {
                opacity: 0.02;
            }
            50% {
                opacity: 0.05;
            }
            100% {
                opacity: 0.01;
            }
        }

        .app {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(6, 6, 6, 0.97);
            border-right: 1px solid var(--border);
            padding: 28px 18px;
            box-shadow: inset -12px 0 25px rgba(255, 0, 0, 0.03);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            z-index: 20;
        }
        .logo {
            color: var(--primary);
            font-weight: 800;
            font-size: 20px;
            letter-spacing: 5px;
            margin-bottom: 45px;
            text-shadow: 0 0 18px rgba(255, 0, 0, 0.55), 0 0 35px rgba(200, 0, 0, 0.3);
            text-align: center;
        }
        .menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        .menu a {
            display: block;
            color: var(--muted);
            text-decoration: none;
            padding: 13px 16px;
            border-radius: 10px;
            border: 1px solid transparent;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.5px;
            transition: all 0.25s ease;
            position: relative;
        }
        .menu a::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: var(--primary);
            border-radius: 0 2px 2px 0;
            transition: height 0.25s;
        }
        .menu a:hover,
        .menu a.active {
            background: rgba(255, 0, 0, 0.07);
            border-color: rgba(255, 0, 0, 0.18);
            color: #ff6b6b;
        }
        .menu a.active::before {
            height: 60%;
        }

        /* Main content */
        .main {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            background: radial-gradient(ellipse at center, rgba(120, 0, 0, 0.06), transparent 60%),
                        linear-gradient(180deg, #040404 0%, #000 100%);
            overflow-y: auto;
        }

        /* Top status bar */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 0 4px;
        }
        .dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--success);
            animation: pulseDot 1.5s infinite;
        }
        @keyframes pulseDot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
        }
        .status-bar span {
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 2px;
            font-weight: 500;
        }

        /* Welcome panel */
        .welcome-panel {
            background: rgba(10, 10, 10, 0.88);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(200, 0, 0, 0.08), inset 0 1px 0 rgba(255,255,255,0.02);
            margin-bottom: 30px;
        }
        .welcome-title {
            font-size: 32px;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(255,0,0,0.4);
            letter-spacing: 4px;
            margin-bottom: 16px;
        }
        .welcome-sub {
            font-family: 'Share Tech Mono', monospace;
            color: #aaa;
            font-size: 14px;
            letter-spacing: 1px;
            line-height: 1.6;
        }
        .glow-line {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff3333, transparent);
            margin: 20px auto 0;
        }

        /* Stats cards (simple) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            margin-top: 10px;
        }
        .stat-card {
            background: rgba(5,5,5,0.85);
            border: 1px solid #2a0e0e;
            border-radius: 20px;
            padding: 24px 16px;
            text-align: center;
            backdrop-filter: blur(8px);
            transition: all 0.25s;
        }
        .stat-card:hover {
            border-color: #ff4444;
            box-shadow: 0 0 25px rgba(255,0,0,0.1);
            transform: translateY(-3px);
        }
        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: #ff7777;
            font-family: 'Orbitron', monospace;
            text-shadow: 0 0 12px rgba(255,0,0,0.5);
        }
        .stat-label {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 8px;
        }

        /* Decorative grid background (instead of map) */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
        }
        .bg-grid::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(#ff3333 1px, transparent 1px),
                linear-gradient(90deg, #ff3333 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: translate(0,0); }
            100% { transform: translate(40px,40px); }
        }

        /* Responsive */
        @media (max-width: 800px) {
            .sidebar {
                width: 80px;
                padding: 20px 8px;
            }
            .menu a {
                font-size: 10px;
                padding: 8px 6px;
                text-align: center;
            }
            .logo {
                font-size: 14px;
            }
            .welcome-title {
                font-size: 24px;
            }
            .stat-value {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <div class="crt-flicker"></div>
    <div class="bg-grid"></div>

    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">ZERO LICH</div>
            <nav class="menu">
                <a href="index.html" class="active">Dashboard</a>
                <a href="info.html">Initialization</a>
                <a href="control.html">Devices Control</a>
                <a href="devices.html">Devices</a>
                <a href="about.html">About</a>
            </nav>
        </aside>

        <!-- Main content -->
        <main class="main">
            <div class="status-bar">
                <div class="dot"></div>
                <span>SYSTEM READY</span>
            </div>

            <div class="welcome-panel">
                <div class="welcome-title">WELCOME BACK</div>
                <div class="welcome-sub">
                    Zero Lich is operational.<br>
                    Secure channel established.
                </div>
                <div class="glow-line"></div>
            </div>

            <!-- Simple stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value">0</div>
                    <div class="stat-label">Active Devices</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">0</div>
                    <div class="stat-label">Pending Alerts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">0</div>
                    <div class="stat-label">Ataacks</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        console.log('%c⚠️ ZERO LICH %c| DASHBOARD %c| Secure session active.',
            'color:#ff1a1a; font-weight:bold; font-size:14px;',
            'color:#aaa;',
            'color:#666;');
    </script>
</body>
</html>
